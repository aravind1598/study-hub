<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>11th Study Hub 📚</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Code:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
input,textarea{user-select:text}

:root{
  --blue:#2563eb;--blue-s:#eff6ff;--green:#16a34a;--green-s:#f0fdf4;
  --bg:#f1f5f9;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;
  --sp:#0a0a18;--sc:#12122a;--sb:#1a1a35;
  --pk:#ff4da6;--pk2:#e91e8c;--pu:#9333ea;--pu2:#7c3aed;
  --st:#f0e6ff;--sm:#9ca3af;
}

body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden}

/* ══ STUDY APP ══ */
.topbar{background:var(--blue);color:#fff;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(37,99,235,.35)}
.topbar h1{font-size:16px;font-weight:900}
.topbar small{font-size:10px;opacity:.7;display:block}
.badge{background:rgba(255,255,255,.2);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800}
.stabs{display:flex;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:52px;z-index:40}
.stabs::-webkit-scrollbar{display:none}
.stab{padding:9px 14px;font-size:11px;font-weight:800;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:.2s;flex-shrink:0}
.stab.on{color:var(--blue);border-bottom-color:var(--blue)}
.panel{display:none;padding:12px;max-width:720px;margin:0 auto;padding-bottom:60px}
.panel.on{display:block}
.chap{background:var(--card);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.07);border:1px solid var(--border)}
.chap-hd{padding:12px 14px;display:flex;align-items:center;gap:11px;cursor:pointer}
.chap-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.chap-hd h3{font-size:13px;font-weight:800;line-height:1.3}
.chap-hd p{font-size:10px;color:var(--muted);margin-top:2px}
.chev{margin-left:auto;font-size:11px;color:var(--muted);transition:.3s;flex-shrink:0}
.chap-hd.open .chev{transform:rotate(180deg)}
.chap-bd{display:none;padding:0 14px 14px}
.chap-bd.open{display:block}
.topic{display:flex;gap:9px;padding:8px 0;border-bottom:1px dashed var(--border)}
.topic:last-child{border-bottom:none}
.tnum{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.tn-b{background:var(--blue-s);color:var(--blue)}.tn-g{background:var(--green-s);color:var(--green)}
.topic-body b{font-size:13px;font-weight:800;display:block}
.topic-body p{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.55}
.fbox{border-radius:0 8px 8px 0;padding:8px 11px;margin:7px 0;font-family:'Fira Code',monospace;font-size:11.5px;line-height:1.75}
.fb-b{background:var(--blue-s);border-left:3px solid var(--blue);color:#1e3a8a}
.fb-g{background:var(--green-s);border-left:3px solid var(--green);color:#14532d}
.ans{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px;line-height:1.7}
.ans b{color:var(--blue);display:block;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.tag{display:inline-block;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:800;margin-top:4px}
.tag-y{background:#fef9c3;color:#854d0e}.tag-r{background:#fee2e2;color:#991b1b}
.sec-head{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:16px 0 8px}
.hero{background:linear-gradient(135deg,var(--blue),#818cf8);border-radius:16px;padding:18px;color:#fff;margin-bottom:14px}
.hero h2{font-size:21px;font-weight:900}
.hero p{font-size:12px;opacity:.8;margin-top:4px}
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.subj-box{background:rgba(255,255,255,.15);border-radius:10px;padding:10px}
.subj-box .ico{font-size:22px}
.subj-box b{font-size:12px;display:block;margin-top:4px}
.subj-box small{font-size:10px;opacity:.7}
.tt-slot{background:var(--card);border-radius:8px;padding:8px 12px;margin-bottom:6px;border-left:4px solid var(--blue)}
.tt-slot b{font-size:12px;display:block}.tt-slot small{font-size:10px;color:var(--muted)}

/* ══ SECRET DOT ══ */
.sdot{position:fixed;bottom:18px;right:18px;width:8px;height:8px;border-radius:50%;background:rgba(120,120,150,.15);border:none;cursor:pointer;z-index:300}

/* ══ PIN SCREEN ══ */
#pinScr{display:none;position:fixed;inset:0;z-index:800;background:var(--sp);flex-direction:column;align-items:center;justify-content:center;gap:16px}
#pinScr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(147,51,234,.15) 0%,transparent 60%);pointer-events:none}
.plock{font-size:40px;animation:bob .8s ease-in-out infinite alternate;position:relative;z-index:1}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.ptitle{color:var(--st);font-size:22px;font-weight:900;position:relative;z-index:1}
.pdots{display:flex;gap:14px;position:relative;z-index:1}
.pdot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,77,166,.3);background:transparent;transition:.2s}
.pdot.on{background:var(--pk);border-color:var(--pk);box-shadow:0 0 10px var(--pk)}
.perr{color:#f87171;font-size:12px;display:none;position:relative;z-index:1}
.ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:216px;position:relative;z-index:1}
.pkey{height:58px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,77,166,.12);color:var(--st);font-size:20px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.pkey:active{transform:scale(.88);background:rgba(255,77,166,.2)}

/* ══ MESSENGER SHELL ══ */
#msg{display:none;position:fixed;inset:0;z-index:900;background:var(--sp);flex-direction:column;overflow:hidden}

/* Animated bg */
.msg-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.msg-bg::before{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(147,51,234,.08) 0%,transparent 70%);top:-50px;right:-80px;animation:drift1 8s ease-in-out infinite alternate}
.msg-bg::after{content:'';position:absolute;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(255,77,166,.06) 0%,transparent 70%);bottom:100px;left:-60px;animation:drift2 10s ease-in-out infinite alternate}
@keyframes drift1{from{transform:translate(0,0)}to{transform:translate(-30px,40px)}}
@keyframes drift2{from{transform:translate(0,0)}to{transform:translate(40px,-30px)}}

/* Stars */
.stars{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:var(--o1,.2)}50%{opacity:var(--o2,.8)}}

/* ══ HEADER ══ */
.mhd{background:rgba(18,18,42,.95);backdrop-filter:blur(20px);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,77,166,.12);position:relative;z-index:2;flex-shrink:0}
.mhd-left{display:flex;align-items:center;gap:10px}
.mav-wrap{position:relative}
.mav{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--pk),var(--pu));display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 14px rgba(255,77,166,.35)}
.mav-ring{position:absolute;inset:-2px;border-radius:50%;border:2px solid transparent;background:linear-gradient(135deg,var(--pk),var(--pu)) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude;animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mname{font-size:14px;font-weight:900;color:var(--st)}
.mstat-row{display:flex;align-items:center;gap:5px;margin-top:2px}
.online{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:pulse2 2s infinite}
@keyframes pulse2{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.mstat{font-size:10px;color:rgba(240,230,255,.38)}
.backbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,77,166,.15);border-radius:20px;color:var(--st);font-family:'Nunito',sans-serif;padding:5px 13px;font-size:11px;cursor:pointer;transition:.2s}
.backbtn:active{background:rgba(255,77,166,.2)}

/* ══ STORIES BAR ══ */
.stories{display:flex;gap:10px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;background:rgba(18,18,42,.6);border-bottom:1px solid rgba(255,77,166,.08);position:relative;z-index:2;flex-shrink:0}
.stories::-webkit-scrollbar{display:none}
.story-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0}
.story-ring{width:46px;height:46px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--pk),var(--pu),#06b6d4);animation:storyRing 3s linear infinite}
@keyframes storyRing{to{filter:hue-rotate(360deg)}}
.story-inner{width:100%;height:100%;border-radius:50%;background:var(--sc);display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid var(--sp)}
.story-seen .story-ring{background:rgba(255,255,255,.12)!important;animation:none}
.story-label{font-size:9px;color:rgba(240,230,255,.4);font-weight:700;max-width:46px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.add-story .story-ring{background:rgba(255,77,166,.2)!important;animation:none}

/* ══ DB STATUS ══ */
.dbbar{padding:4px 14px;font-size:10px;display:flex;align-items:center;gap:6px;background:rgba(10,10,24,.8);position:relative;z-index:2;flex-shrink:0}
.dbd{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:pulse2 2s infinite}
.dbd.err{background:#f87171;animation:none}

/* ══ MESSAGES ══ */
.msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px;position:relative;z-index:1}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,77,166,.2);border-radius:2px}

/* Date divider */
.mdiv{text-align:center;font-size:10px;color:rgba(240,230,255,.2);margin:6px 0;position:relative}
.mdiv::before,.mdiv::after{content:'';position:absolute;top:50%;width:28%;height:1px;background:rgba(255,77,166,.08)}
.mdiv::before{left:4%}.mdiv::after{right:4%}

/* Bubbles */
.bub{max-width:78%;border-radius:20px;font-size:13px;line-height:1.5;position:relative;animation:popIn .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes
